<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match-a-Bank | Payroll Records</title>
    <link rel="stylesheet" href="css/admin-payroll-records.css">
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo-section">
                <img src="images/logo.png" alt="Match-a-Bank Logo" class="app-logo">
                <h1>Match-a-Bank</h1>
            </div>

            <nav class="nav-menu">
        <a href="admin-employee-dashboard.html" class="nav-btn">Employees</a>
        <a href="admin-salary-search.html" class="nav-btn">Calculate Salary</a>
        <a href="admin-payroll-records.html" class="nav-btn active">Payroll Records</a>
        <a href="admin-payroll-report.html" class="nav-btn">Payroll Report</a>
        <div class="spacer"></div>
        <a href="index.html" class="nav-btn logout">Logout</a>
    </nav>
        </aside>

        <main class="main-content">
            <section class="table-container">
                <table class="records-table">
                    <thead>
                        <tr>
                            <th># ID <span class="sort-icon"></span></th>
                            <th>Employee <span class="sort-icon"></span></th>
                            <th>Start <span class="sort-icon"></span></th>
                            <th>End <span class="sort-icon"></span></th>
                            <th>Gross <span class="sort-icon"></span></th>
                            <th>Net Pay <span class="sort-icon"></span></th>
                            <th>Status <span class="sort-icon"></span></th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <div id="admin-payroll-records-message" class="form__message" aria-live="polite"></div>

    <script src="js/app.js" defer></script>

</body>
</html>
