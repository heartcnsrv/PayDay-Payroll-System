<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match-a-Bank | Edit Employee Found</title>
    <link rel="stylesheet" href="css/admin-employee-edit-found.css">
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo-section">
                <img src="images/logo.png" alt="Match-a-Bank Logo" class="app-logo">
                <h1>Match-a-Bank</h1>
            </div>

<nav class="nav-menu">
        <a href="admin-employee-dashboard.html" class="nav-btn active">Employees</a>
        <a href="admin-salary-search.html" class="nav-btn">Calculate Salary</a>
        <a href="admin-payroll-records.html" class="nav-btn">Payroll Records</a>
        <a href="admin-payroll-report.html" class="nav-btn">Payroll Report</a>
        <div class="spacer"></div>
        <a href="index.html" class="nav-btn logout">Logout</a>
    </nav>
        </aside>

        <main class="main-content">
            <header class="top-nav">
                <div class="action-tabs">
    <a href="admin-employee-view.html" class="tab-btn">View Employees</a>
    <a href="admin-employee-add.html" class="tab-btn">Add Employee</a>
    <a href="admin-employee-edit-search.html" class="tab-btn active">Edit Employee</a>
    <a href="admin-employee-deactivate-search.html" class="tab-btn">Deactivate Employee</a>
</div>
            </header>

            <section class="search-section">
                <div class="search-wrapper">
                    <div class="search-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    </div>
                    <input type="text" class="search-input" value="">
                </div>
                <p class="result-text"></p>
            </section>

            <section class="form-container">
                <div id="employee-edit-message" class="form__message" aria-live="polite"></div>
                <form class="employee-form">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Username</label>
                            <input type="text" name="username" placeholder="Value">
                        </div>
                        <div class="form-group">
                            <label>Department</label>
                            <input type="text" name="department" placeholder="Value">
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" name="password" placeholder="Value">
                        </div>
                        <div class="form-group">
                            <label>Position</label>
                            <input type="text" name="position" placeholder="Value">
                        </div>
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" name="full_name" placeholder="Value">
                        </div>
                        <div class="form-group">
                            <label>Date Hired</label>
                            <input type="text" name="date_hired" placeholder="YYYY-MM-DD">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" name="email" placeholder="Value">
                        </div>
                        <div class="form-group">
                            <label>Base Salary</label>
                            <input type="text" name="base_salary" placeholder="Value">
                        </div>
                        <div class="form-group">
                            <label>Phone</label>
                            <input type="text" name="phone" placeholder="Value">
                        </div>
                        <div class="form-group">
                            <label>Hourly Rate</label>
                            <input type="text" name="hourly_rate" placeholder="Value">
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="edit-btn">Edit</button>
                        <button type="button" class="cancel-btn">Cancel</button>
                    </div>
                </form>
            </section>
        </main>
    </div>

    <script src="js/app.js" defer></script>

</body>
</html>
