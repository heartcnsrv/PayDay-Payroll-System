<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match-a-Bank | Add Employee</title>
    <link rel="stylesheet" href="css/admin-employee-add.css">
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo-section">
                <img src="images/logo.png" alt="Match-a-Bank Logo" class="app-logo">
                <h1>Match-a-Bank</h1>
            </div>

            <nav class="nav-menu">
        <a href="admin-employee-dashboard.html" class="nav-btn active">Employees</a>
        <a href="admin-salary-search.html" class="nav-btn">Calculate Salary</a>
        <a href="admin-payroll-records.html" class="nav-btn">Payroll Records</a>
        <a href="admin-payroll-report.html" class="nav-btn">Payroll Report</a>
        <div class="spacer"></div>
        <a href="index.html" class="nav-btn logout">Logout</a>
    </nav>
        </aside>

        <main class="main-content">
            <header class="top-nav">
                <div class="action-tabs">
    <a href="admin-employee-view.html" class="tab-btn">View Employees</a>
    <a href="admin-employee-add.html" class="tab-btn active">Add Employee</a>
    <a href="admin-employee-edit-search.html" class="tab-btn">Edit Employee</a>
    <a href="admin-employee-deactivate-search.html" class="tab-btn">Deactivate Employee</a>
</div>
            </header>

            <section class="form-container">
                <form class="employee-form">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Username</label>
                            <input type="text" placeholder="Value">
                        </div>
                        <div class="form-group">
                            <label>Department</label>
                            <input type="text" placeholder="Value">
                        </div>
                        
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" placeholder="Value">
                        </div>
                        <div class="form-group">
                            <label>Position</label>
                            <input type="text" placeholder="Value">
                        </div>

                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" placeholder="Value">
                        </div>
                        <div class="form-group">
                            <label>Date Hired</label>
                            <input type="text" placeholder="YYYY-MM-DD">
                        </div>

                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" placeholder="Value">
                        </div>
                        <div class="form-group">
                            <label>Base Salary</label>
                            <input type="text" placeholder="Value">
                        </div>

                        <div class="form-group">
                            <label>Phone</label>
                            <input type="text" placeholder="Value">
                        </div>
                        <div class="form-group">
                            <label>Hourly Rate</label>
                            <input type="text" placeholder="Value">
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="reset" class="submit-btn">Submit</button>
                        <button type="reset" class="cancel-btn">Cancel</button>
                    </div>
                </form>
            </section>
        </main>
    </div>

</body>
</html>
