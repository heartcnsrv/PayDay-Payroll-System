<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match-a-Bank | Your Payroll Records</title>
    <link rel="stylesheet" href="css/employee-payroll.css">
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo-section">
                <img src="images/logo.png" alt="Match-a-Bank Logo" class="app-logo">
                <h1>Match-a-Bank</h1>
            </div>

            <nav class="nav-menu">
                <button class="nav-btn active">Payroll Records</button>
                <div class="spacer"></div>
                 <a href="index.html" class="nav-btn logout">Logout</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="page-header">
                <h2>Your Payroll Records</h2>
            </header>

            <section class="table-container">
                <table class="payroll-table">
                    <thead>
                        <tr>
                            <th># ID <span class="sort-icon"></span></th>
                            <th>Employee <span class="sort-icon"></span></th>
                            <th>Start <span class="sort-icon"></span></th>
                            <th>End <span class="sort-icon"></span></th>
                            <th>Gross <span class="sort-icon"></span></th>
                            <th>Net Pay <span class="sort-icon"></span></th>
                            <th>Status <span class="sort-icon"></span></th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <div id="employee-payroll-message" class="form__message" aria-live="polite"></div>

    <script src="js/app.js" defer></script>

</body>
</html>
