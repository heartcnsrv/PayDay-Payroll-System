# ==============================================================
#  PayDay | payday-vhost.conf
#
#  Architecture:
#    Browser → Apache (WAMP/XAMPP) → proxy.php → C server :8081
#
#  WAMP path:
#    C:\wamp64\bin\apache\apache2.4.XX\conf\extra\httpd-vhosts.conf
#
#  XAMPP (macOS/Linux) path:
#    /Applications/XAMPP/xamppfiles/etc/extra/httpd-vhosts.conf
#    or /opt/lampp/etc/extra/httpd-vhosts.conf
#
#  Also enable in httpd.conf:
#    Include conf/extra/httpd-vhosts.conf
#    LoadModule rewrite_module modules/mod_rewrite.so
# ==============================================================

# ── Keep localhost working ────────────────────────────────────
<VirtualHost *:80>
    ServerName   localhost
    DocumentRoot "C:/wamp64/www"
    <Directory "C:/wamp64/www/">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>

# ── PayDay (WAMP — Windows) ───────────────────────────────────
<VirtualHost *:80>
    ServerName   payday
    DocumentRoot "C:/wamp64/www/PayDay"

    RedirectMatch ^/$ /src/gui/

    <Directory "C:/wamp64/www/PayDay">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    RewriteEngine On
    RewriteRule ^/api/(.+)$ /backend/proxy.php [QSA,L]

    <Directory "C:/wamp64/www/PayDay/data">
        Require all denied
    </Directory>

    ErrorLog  "C:/wamp64/logs/payday-error.log"
    CustomLog "C:/wamp64/logs/payday-access.log" combined
</VirtualHost>

